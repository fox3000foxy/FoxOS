<link rel="stylesheet" href="?config=dialog.css">
<script src="?script=dialog.js"></script>
<script>
function readDir(dir){
	fetch(location.origin+"/?files="+dir)
	.then((res)=>{return res.json()})
	.then((res)=>{
		if(res.indexOf("documents")==-1) showHTML(['..',...res])
		else showHTML(res)
	})
}

function showHTML(files){
	document.body.innerHTML = ""
	filechoice = location.search.indexOf('filechoice')!=-1?true:false
	if(filechoice==true){document.body.innerHTML += "Please select your file..."}
	files.forEach((file,i)=>{
		if (file=="°°°°°") return
		if(file=="..") document.body.innerHTML += "<div class='icon up' id='file"+i+"' ondblclick='goDir(this.innerText)' onclick='setBluebox(this)' oncontextmenu='event.preventDefault()'>"+file+"<\/div>"
		else if(file.startsWith(".") || file == "node_modules") return
		else if (i<files.indexOf("°°°°°")) document.body.innerHTML += "<div class='icon folder' id='file"+i+"' onclick='setBluebox(this)' ondblclick='goDir(this.innerText)' oncontextmenu='contextMenu(this,\"folder\")'>"+file+"<\/div>"
		else document.body.innerHTML += "<div  class='icon file'  id='file"+i+"' onclick='setBluebox(this)' ondblclick='"+(filechoice==true?"selectFile":"openFile")+"(this.innerText)' oncontextmenu='contextMenu(this,\"file\")'>"+file+"<\/div>"
	})
	document.body.innerHTML += '<div id="menu" style="visibility:hidden;position:absolute;width:150px;left:0;top:0"><\/div>'
	document.body.style = "background-color:#FEFEFE"
	document.body.innerHTML += `
	<div id="dialogoverlay"></div>
	<div id="dialogbox">
	  <div>
		<div id="dialogboxhead"></div>
		<div id="dialogboxbody"></div>
		<div id="dialogboxfoot"></div>
	  </div>
	</div>
	`
}
setBluebox = (elem)=>{
	resetBluebox()
	elem.setAttribute('style','background-color:rgba(0,0,255,0.4);border:1px solid lightblue')
}

selected=0

function contextMenu(elem,type){
	if(selected==1) return
	selected = 1
	setTimeout(()=>{selected=0},10)
	menu = document.getElementById('menu')
	
	<!-- console.log("Right-Clic") -->
	if(type=="file") {
		options = [
		<!-- {value:"Open",color:"red",action:()=>{openFile(elem.innerText)}} -->
		<!-- HERE -->
			{value:"Delete",color:"red",action:`
			<!-- console.log("${dir}"); -->
			socket.emit("deleteFile","${dir}${elem.innerText}");
			readDir("${dir}")
			`}
		]
	}
	if(type=="folder") {
		options = [
			{value:"Delete",color:"red",action:`
			<!-- console.log("${dir}"); -->
			socket.emit("deleteFolder","${dir}${elem.innerText}");
			readDir("${dir}")
			`}
		]
	}
	if(type=="subroot") {
			<!-- Prompt.render('Type the name of the folder you want to create:','createFolder'); -->
		options = [
			{value:"Create folder",color:"black",action:'Prompt.render("Type the name of the folder you want to create :","createFolder")'},
			{value:"Create file",color:"black",action:'Prompt.render("Type the name of the file you want to create :","createFile")'}
		]
	}
	menu.innerHTML = ""
	options.forEach((option)=>{
		menu.innerHTML += "<span class='overlayable' style='color:"+option.color+"' onclick='"+option.action+"'>"+option.value+"</span><br>"
	})
	menu.style.left = event.clientX+"px"
	menu.style.top = event.clientY+"px"
	menu.style.visibility = "visible"
	event.preventDefault()
}

function createFile(name){
socket.emit("createFile",dir+name)
readDir(dir)
}

function createFolder(name){
socket.emit("createFolder",dir+name)
readDir(dir)
}

function hideMenu(){
	<!-- console.log("hidin") -->
	menu.style.visibility = "hidden"
}

function goDir(directory){
	dir += directory+"/";
	readDir(dir)
}

function openFile(file){
parent.openApp("notepad","file="+dir+file)
}

function selectFile(file){
socket.emit("fileChoiced",dir+file)
parent.document.getElementById(window.name).parentElement.remove();
}

if (location.search.indexOf("path=")!=-1)
	dir = location.search.split("path=")[1]
else
	dir = './filesystem/'
readDir(dir)
function resetBluebox(){
	[...document.getElementsByClassName('icon')].forEach((box)=>{
		box.style=''
	})
}
</script>
